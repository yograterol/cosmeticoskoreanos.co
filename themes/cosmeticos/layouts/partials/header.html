<header class="header" role="banner">
    <div class="header__container">
        <a href="/" class="logo" aria-label="Cosméticos Coreanos - Inicio">
            <span class="logo__text">Cosméticos<span class="logo__highlight">Koreanos</span></span>
        </a>
        
        <nav class="nav" role="navigation" aria-label="Navegación principal">
            <button class="nav__toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Abrir menú">
                <span class="nav__hamburger"></span>
            </button>
            
            <ul class="nav__menu" id="nav-menu">
                {{ range .Site.Menus.main }}
                <li class="nav__item">
                    <a href="{{ .URL }}" class="nav__link{{ if $.IsMenuCurrent . $. }} nav__link--active{{ end }}">
                        {{ .Name }}
                    </a>
                </li>
                {{ end }}
            </ul>
        </nav>
    </div>
</header>
