name = "cosmeticoskoreanos-co"
compatibility_date = "2026-03-18"

[build]
command = "hugo --minify"
output_directory = "public"

[site]
bucket = "./public"

# Handle 404s with custom page
not_found = "/404.html"

# Disable trailing slashes
[[redirects]]
from = "/*"
to = "/:splat"
status = 301

# Rules for specific patterns
[[redirects]]
from = "/:path*/"
to = "/:path"
status = 301

# Headers for caching and security
[[headers]]
for = "/*"
[headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/css/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/js/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/images/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/og/*"
[headers.values]
  Cache-Control = "public, max-age=86400"
